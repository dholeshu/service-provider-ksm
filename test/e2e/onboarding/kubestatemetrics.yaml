apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetricsConfig
metadata:
  name: test-config
  namespace: default
spec:
  customResourceStateConfig: |
    kind: CustomResourceStateMetrics
    spec:
      resources:
        - groupVersionKind:
            group: account.btp.sap.crossplane.io
            version: "*"
            kind: "*"
          labelsFromPath:
            name: [metadata, name]
            namespace: [metadata, namespace]
          metricNamePrefix: crossplane_btp
          metrics:
            - name: resource_generation
              help: "Resource generation"
              each:
                type: Gauge
                gauge:
                  path: [metadata, generation]
---
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: test-mcp
spec:
  version: v2.18.0  # Image pulled from crimson-prod.common.repositories.cloud.sap
  namespace: observability
  replicas: 1
  customResourceStateOnly: true
  configRef:
    name: test-config

