# Example: Reusing the same config across multiple KSM deployments
# One KubeStateMetricsConfig can be referenced by multiple KubeStateMetrics resources.
---
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetricsConfig
metadata:
  name: shared-config
  namespace: default
spec:
  customResourceStateConfig: |
    kind: CustomResourceStateMetrics
    spec:
      resources:
        - groupVersionKind:
            group: account.btp.sap.crossplane.io
            version: "*"
            kind: "*"
          metricNamePrefix: crossplane_btp
          metrics:
            - name: resource_generation
              help: "Resource generation"
              each:
                type: Gauge
                gauge:
                  path: [metadata, generation]
---
# First KSM deployment — name must match the first MCP name
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: mcp-cluster-1  # Must match ManagedControlPlane name
  namespace: default
spec:
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
  namespace: observability
  customResourceStateOnly: true
  configRef:
    name: shared-config
---
# Second KSM deployment — name must match the second MCP name
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: mcp-cluster-2  # Must match ManagedControlPlane name
  namespace: default
spec:
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
  namespace: observability
  customResourceStateOnly: true
  configRef:
    name: shared-config
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
