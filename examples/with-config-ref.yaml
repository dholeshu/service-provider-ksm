# Example 1: KubeStateMetricsConfig for Crossplane resources
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetricsConfig
metadata:
  name: crossplane-config
  namespace: observability
spec:
  customResourceStateConfig: |
    kind: CustomResourceStateMetrics
    spec:
      resources:
        - groupVersionKind:
            group: account.btp.sap.crossplane.io
            version: "*"
            kind: "*"
          labelsFromPath:
            name:
              - metadata
              - name
            namespace:
              - metadata
              - namespace
          metricNamePrefix: crossplane_btp
          metrics:
            - name: resource_generation
              help: "Resource generation (metadata.generation). Always present and numeric."
              each:
                type: Gauge
                gauge:
                  path: [metadata, generation]
            - name: condition_ready_status
              help: "Ready condition status of the custom resource (1=true, 0=false)."
              each:
                type: Gauge
                gauge:
                  path: [status, conditions, "[type=Ready]", status]
            - name: condition_synced_status
              help: "Synced condition status of the custom resource (1=true, 0=false)."
              each:
                type: Gauge
                gauge:
                  path: [status, conditions, "[type=Synced]", status]
---
# KubeStateMetrics deployment referencing the config
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: crossplane-metrics
  namespace: default
spec:
  image: crimson-prod.common.repositories.cloud.sap/kube-state-metrics/kube-state-metrics:v2.18.0  # Image pulled from crimson-prod.common.repositories.cloud.sap
  namespace: observability
  replicas: 1
  customResourceStateOnly: true

  # Reference the config created above
  configRef:
    name: crossplane-config
    namespace: observability

  # Image pull secrets (optional)
  imagePullSecrets:
    - name: artifactory-readonly-docker

  # Resource requests and limits (optional)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Node selector (optional)
  nodeSelector:
    kubernetes.io/os: linux
