# Example: KubeStateMetricsConfig with both custom and standard config
---
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetricsConfig
metadata:
  name: full-config
  namespace: default
spec:
  # Configuration for custom resources
  customResourceStateConfig: |
    kind: CustomResourceStateMetrics
    spec:
      resources:
        - groupVersionKind:
            group: account.btp.sap.crossplane.io
            version: "*"
            kind: "*"
          labelsFromPath:
            name: [metadata, name]
            namespace: [metadata, namespace]
          metricNamePrefix: crossplane_btp
          metrics:
            - name: deployment_replicas
              help: "Number of desired replicas"
              each:
                type: Gauge
                gauge:
                  path: [spec, replicas]

  # Standard kube-state-metrics configuration
  config: |
    resources:
      - deployments
      - pods
      - nodes
      - services
      - configmaps

  # Additional configuration files
  additionalConfigs:
    prometheus-rules.yaml: |
      groups:
        - name: kube-state-metrics
          rules:
            - alert: KSMDown
              expr: up{job="kube-state-metrics"} == 0
              for: 5m
---
# KubeStateMetrics using the full config
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: my-mcp  # Must match ManagedControlPlane name
  namespace: default
spec:
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
  namespace: observability
  replicas: 2
  configRef:
    name: full-config
