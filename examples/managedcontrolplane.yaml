# Example ManagedControlPlaneV2 resource
# The MCP must be created FIRST before creating KubeStateMetrics resources.
# The KubeStateMetrics resource name must match the MCP name.
---
apiVersion: core.openmcp.cloud/v2alpha1
kind: ManagedControlPlaneV2
metadata:
  name: my-mcp  # KubeStateMetrics name must match this
  namespace: default
spec:
  provider: kind
  region: local
