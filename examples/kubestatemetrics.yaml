---
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: test-ksm
  namespace: default
spec:
  # Full image path including registry, repository, and tag
  image: crimson-prod.common.repositories.cloud.sap/kube-state-metrics/kube-state-metrics:v2.18.0

  namespace: observability
  replicas: 1
  customResourceStateOnly: false  # Monitor both standard and custom resources

  configRef:
    name: test-config

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
