# Basic KubeStateMetrics deployment
# IMPORTANT: The KubeStateMetrics name MUST match the ManagedControlPlane name
---
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: my-mcp  # Must match ManagedControlPlane name
  namespace: default
spec:
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
  namespace: observability
  replicas: 1

  configRef:
    name: my-config

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
