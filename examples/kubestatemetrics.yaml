---
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: test-ksm
  namespace: default
spec:
  version: v2.18.0  # Image pulled from crimson-prod.common.repositories.cloud.sap
  namespace: observability
  replicas: 1
  customResourceStateOnly: false  # Monitor both standard and custom resources
  configRef:
    name: test-config
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
