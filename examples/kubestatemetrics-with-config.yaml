# KubeStateMetrics with a configuration reference
# The KubeStateMetricsConfig name can be anything — it does NOT need to match the MCP name.
# Only the KubeStateMetrics name must match the ManagedControlPlane name.
#
# Alternative: For a simpler approach, create a ConfigMap named "kube-state-metrics-config"
# directly on the MCP cluster. See examples/mcp-native-config.yaml.
---
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetricsConfig
metadata:
  name: my-metrics-config
  namespace: default
spec:
  targetNamespace: observability
  customResourceStateConfig: |
    spec:
      resources:
        - groupVersionKind:
            group: "apps"
            version: "v1"
            kind: "Deployment"
          metricNamePrefix: kube_deployment
          metrics:
            - name: "replicas"
              help: "Number of replicas"
              each:
                type: Gauge
                gauge:
                  path: [spec, replicas]
---
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: my-mcp  # Must match ManagedControlPlane name
  namespace: default
spec:
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
  replicas: 1
  namespace: observability
  configRef:
    name: my-metrics-config  # References the config above
  args:
    - --resources=deployments,pods,nodes
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 32Mi
