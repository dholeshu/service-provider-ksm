# Example: KubeStateMetrics for standard Kubernetes resources
# This monitors built-in resources like Deployments, Pods, Nodes, etc.
#
# Step 1: Deploy the MCP-native ConfigMap on the MCP cluster
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-state-metrics-config
  namespace: observability
data:
  config.yaml: |
    # Resource types to monitor (standard Kubernetes resources)
    # Full list: https://github.com/kubernetes/kube-state-metrics/blob/main/docs/README.md
    resources:
      - deployments
      - pods
      - nodes
      - services
      - configmaps
      - secrets
      - persistentvolumes
      - persistentvolumeclaims
      - namespaces
      - replicasets
      - statefulsets
      - daemonsets
      - jobs
      - cronjobs
---
# Step 2: Deploy KubeStateMetrics on the onboarding cluster
apiVersion: ksm.services.openmcp.cloud/v1alpha1
kind: KubeStateMetrics
metadata:
  name: my-mcp  # Must match ManagedControlPlane name
  namespace: default
spec:
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
  namespace: observability
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
